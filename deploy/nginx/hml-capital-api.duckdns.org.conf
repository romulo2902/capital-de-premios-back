# Nginx reverse proxy for Capital de Premios API — HOMOLOGACAO.
# Antes de instalar: emitir o certificado com
#   sudo systemctl stop nginx
#   sudo certbot certonly --standalone -d hml-capital-api.duckdns.org
#   sudo systemctl start nginx
# Depois copiar para /etc/nginx/sites-available/hml-capital-api.duckdns.org,
# criar o symlink em sites-enabled e recarregar o Nginx.

server {
    server_name hml-capital-api.duckdns.org;

    client_max_body_size 300m;

    location = /api/admin/ranges/matriz/upload {
        client_max_body_size 300m;
        client_body_timeout 120s;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;

        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/admin/migracao/importar-xlsx {
        client_max_body_size 300m;
        client_body_timeout 120s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/hml-capital-api.duckdns.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/hml-capital-api.duckdns.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = hml-capital-api.duckdns.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name hml-capital-api.duckdns.org;
    return 404; # managed by Certbot
}
