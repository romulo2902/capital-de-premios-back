# Nginx reverse proxy for Capital de Premios API.
# This file mirrors the current Certbot-managed VPS config.
# Copy to /etc/nginx/sites-available/capital-premios-api and reload Nginx.

server {
    server_name api2.capitaldepremios.com.br;

    # Mantem o limite geral alto o suficiente para o upload da matriz.
    # O NestJS ainda valida o endpoint com limite proprio de 250MB.
    client_max_body_size 300m;

    location = /api/admin/ranges/matriz/upload {
        client_max_body_size 300m;
        client_body_timeout 120s;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api2.capitaldepremios.com.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api2.capitaldepremios.com.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = api2.capitaldepremios.com.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name api2.capitaldepremios.com.br;
    return 404; # managed by Certbot
}
